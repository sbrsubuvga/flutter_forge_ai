version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: "development"
    develop:
      watch:
        - action: sync
          path: ./api/src
          target: /app/src

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    depends_on:
      - api
